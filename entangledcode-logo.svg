<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 70" role="img" aria-label="Entangled Code logo">
  <title>Entangled Code — Quantum AI Platform</title>
  <defs>
    <!-- Gradient for wordmark -->
    <linearGradient id="ecWord" x1="98" y1="0" x2="338" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="ecGlow" x="-40%" y="-50%" width="180%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICON: Lemniscate / Entanglement Symbol === -->
  <!-- Two interlocked loops representing quantum entanglement -->
  <!-- Crossing point at center (40, 35) -->

  <!-- Subtle fill areas -->
  <path d="M 40,35 C 36,22 8,22 8,35 C 8,48 36,48 40,35"
        fill="#7c3aed" opacity="0.08"/>
  <path d="M 40,35 C 44,22 72,22 72,35 C 72,48 44,48 40,35"
        fill="#06b6d4" opacity="0.08"/>

  <g filter="url(#ecGlow)">
    <!-- Left lobe (violet) — represents one entangled qubit -->
    <path d="M 40,35 C 36,22 8,22 8,35 C 8,48 36,48 40,35"
          fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right lobe (cyan) — represents the other entangled qubit -->
    <path d="M 40,35 C 44,22 72,22 72,35 C 72,48 44,48 40,35"
          fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left qubit dot -->
    <circle cx="8" cy="35" r="3.5" fill="#8b5cf6"/>
    <!-- Right qubit dot -->
    <circle cx="72" cy="35" r="3.5" fill="#22d3ee"/>
    <!-- Center crossing marker -->
    <circle cx="40" cy="35" r="2" fill="#e2e8f0" opacity="0.65"/>
  </g>

  <!-- Divider line -->
  <line x1="88" y1="9" x2="88" y2="63" stroke="#1e293b" stroke-width="1"/>

  <!-- === WORDMARK === -->
  <text x="100" y="43"
        font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="23" font-weight="600" letter-spacing="-0.3"
        fill="url(#ecWord)">entangled code</text>

  <!-- Tagline -->
  <text x="102" y="58"
        font-family="'Inter', system-ui, -apple-system, sans-serif"
        font-size="7.5" font-weight="500" letter-spacing="3"
        fill="#475569">QUANTUM AI PLATFORM</text>
</svg>
