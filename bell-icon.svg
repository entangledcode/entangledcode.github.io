<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Bell icon">
  <title>Bell</title>
  <defs>
    <linearGradient id="biCurve" x1="8" y1="0" x2="72" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="biGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Filled area under curve -->
  <path d="M 8,62 C 20,62 26,14 40,14 C 54,14 60,62 72,62 L 72,67 L 8,67 Z"
        fill="url(#biCurve)" opacity="0.1"/>

  <g filter="url(#biGlow)">
    <!-- Bell curve stroke -->
    <path d="M 8,62 C 20,62 26,14 40,14 C 54,14 60,62 72,62"
          fill="none" stroke="url(#biCurve)" stroke-width="3" stroke-linecap="round"/>
    <!-- Baseline -->
    <line x1="3" y1="67" x2="77" y2="67"
          stroke="url(#biCurve)" stroke-width="1.5" opacity="0.3"/>
    <!-- Peak dot -->
    <circle cx="40" cy="14" r="3.5" fill="#22d3ee" opacity="0.95"/>
    <!-- Tail dots -->
    <circle cx="8" cy="62" r="2" fill="#7c3aed" opacity="0.65"/>
    <circle cx="72" cy="62" r="2" fill="#06b6d4" opacity="0.65"/>
  </g>
</svg>
