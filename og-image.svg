<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="520" y1="0" x2="1150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs behind logo -->
  <ellipse cx="280" cy="315" rx="320" ry="240" fill="#7c3aed" opacity="0.07"/>
  <ellipse cx="320" cy="315" rx="200" ry="160" fill="#06b6d4" opacity="0.05"/>

  <!-- Entanglement symbol — large, left side, ~500px wide -->
  <g transform="translate(30, 65)" filter="url(#glow)">
    <!-- Left lobe fill -->
    <path d="M 250,250 C 228,112 30,112 30,250 C 30,388 228,388 250,250"
          fill="#7c3aed" opacity="0.1"/>
    <!-- Right lobe fill -->
    <path d="M 250,250 C 272,112 470,112 470,250 C 470,388 272,388 250,250"
          fill="#06b6d4" opacity="0.1"/>
    <!-- Left lobe stroke -->
    <path d="M 250,250 C 228,112 30,112 30,250 C 30,388 228,388 250,250"
          fill="none" stroke="#8b5cf6" stroke-width="9" stroke-linecap="round"/>
    <!-- Right lobe stroke -->
    <path d="M 250,250 C 272,112 470,112 470,250 C 470,388 272,388 250,250"
          fill="none" stroke="#06b6d4" stroke-width="9" stroke-linecap="round"/>
    <!-- Left qubit dot -->
    <circle cx="30" cy="250" r="18" fill="#8b5cf6"/>
    <!-- Right qubit dot -->
    <circle cx="470" cy="250" r="18" fill="#22d3ee"/>
    <!-- Center crossing -->
    <circle cx="250" cy="250" r="10" fill="#e2e8f0" opacity="0.7"/>
  </g>

  <!-- Right side: text -->
  <!-- Company label -->
  <text x="580" y="220"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="24" font-weight="400" letter-spacing="4"
        fill="#475569">ENTANGLED CODE</text>

  <!-- Main headline -->
  <text x="578" y="310"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="64" font-weight="700" letter-spacing="-1.5"
        fill="url(#wordmark)">Ask quantum</text>
  <text x="578" y="385"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="64" font-weight="700" letter-spacing="-1.5"
        fill="url(#wordmark)">questions.</text>

  <!-- Sub -->
  <text x="580" y="445"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400"
        fill="#64748b">Powered by Bell — Quantum AI Platform</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.7"/>
</svg>
