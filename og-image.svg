<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="loopL" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="loopR" x1="200" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="440" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="315" rx="260" ry="200" fill="#7c3aed" opacity="0.06"/>
  <ellipse cx="1000" cy="315" rx="260" ry="200" fill="#06b6d4" opacity="0.06"/>

  <!-- Entanglement icon — large, centered vertically on left -->
  <g transform="translate(100, 195) scale(2.6)" filter="url(#glow)">
    <!-- Left lobe fill -->
    <path d="M 120,60 C 110,28 20,28 20,60 C 20,92 110,92 120,60" fill="#7c3aed" opacity="0.1"/>
    <!-- Right lobe fill -->
    <path d="M 120,60 C 130,28 220,28 220,60 C 220,92 130,92 120,60" fill="#06b6d4" opacity="0.1"/>
    <!-- Left lobe stroke -->
    <path d="M 120,60 C 110,28 20,28 20,60 C 20,92 110,92 120,60" fill="none" stroke="url(#loopL)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right lobe stroke -->
    <path d="M 120,60 C 130,28 220,28 220,60 C 220,92 130,92 120,60" fill="none" stroke="url(#loopR)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left dot -->
    <circle cx="20" cy="60" r="10" fill="#8b5cf6"/>
    <!-- Right dot -->
    <circle cx="220" cy="60" r="10" fill="#22d3ee"/>
    <!-- Center crossing -->
    <circle cx="120" cy="60" r="6" fill="#e2e8f0" opacity="0.7"/>
  </g>

  <!-- Company name -->
  <text x="112" y="470"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="500" letter-spacing="2"
        fill="#64748b">ENTANGLED CODE</text>

  <!-- Divider -->
  <line x1="112" y1="500" x2="700" y2="500" stroke="#1e293b" stroke-width="1"/>

  <!-- Product name -->
  <text x="112" y="575"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="400" letter-spacing="1"
        fill="#475569">Bell — Quantum AI Platform</text>

  <!-- Main tagline -->
  <text x="112" y="390"
        font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="700" letter-spacing="-1"
        fill="url(#wordmark)">Ask quantum questions.</text>

  <!-- Bell curve decoration — right side -->
  <g transform="translate(820, 80)" filter="url(#glowStrong)" opacity="0.35">
    <path d="M 20,220 C 60,220 80,40 140,40 C 200,40 220,220 260,220"
          fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20,220 C 60,220 80,40 140,40 C 200,40 220,220 260,220 L 260,230 L 20,230 Z"
          fill="#7c3aed" opacity="0.15"/>
    <line x1="5" y1="230" x2="275" y2="230" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
    <circle cx="140" cy="40" r="7" fill="#22d3ee" opacity="0.9"/>
    <circle cx="20" cy="220" r="5" fill="#7c3aed" opacity="0.7"/>
    <circle cx="260" cy="220" r="5" fill="#06b6d4" opacity="0.7"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#tagGrad)" opacity="0.6"/>
</svg>
