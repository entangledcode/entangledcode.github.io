<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="560" y1="0" x2="1160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-50%" width="150%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blob" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="260" cy="345" rx="280" ry="180" fill="#7c3aed" opacity="0.08" filter="url(#blob)"/>
  <ellipse cx="260" cy="345" rx="180" ry="120" fill="#06b6d4" opacity="0.05" filter="url(#blob)"/>

  <g filter="url(#glow)">
    <!-- Left lobe fill — width 240, height 120 → 2:1 ratio, centered at y=345 -->
    <path d="M 260,345 C 240,285 20,285 20,345 C 20,405 240,405 260,345"
          fill="#7c3aed" opacity="0.1"/>
    <!-- Right lobe fill -->
    <path d="M 260,345 C 280,285 500,285 500,345 C 500,405 280,405 260,345"
          fill="#06b6d4" opacity="0.1"/>
    <!-- Left lobe stroke -->
    <path d="M 260,345 C 240,285 20,285 20,345 C 20,405 240,405 260,345"
          fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
    <!-- Right lobe stroke -->
    <path d="M 260,345 C 280,285 500,285 500,345 C 500,405 280,405 260,345"
          fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round"/>
    <!-- Left qubit dot -->
    <circle cx="20" cy="345" r="15" fill="#8b5cf6"/>
    <!-- Right qubit dot -->
    <circle cx="500" cy="345" r="15" fill="#22d3ee"/>
    <!-- Center crossing -->
    <circle cx="260" cy="345" r="8" fill="#e2e8f0" opacity="0.75"/>
  </g>

  <!-- Divider -->
  <line x1="560" y1="160" x2="560" y2="490" stroke="#1e293b" stroke-width="1"/>

  <!-- Right: text -->
  <text x="598" y="230"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400" letter-spacing="4"
        fill="#475569">ENTANGLED CODE</text>

  <text x="595" y="330"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="68" font-weight="700" letter-spacing="-2"
        fill="url(#wordmark)">Ask quantum</text>
  <text x="595" y="410"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="68" font-weight="700" letter-spacing="-2"
        fill="url(#wordmark)">questions.</text>

  <text x="598" y="468"
        font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400"
        fill="#475569">Bell — Quantum AI Platform</text>

  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.7"/>
</svg>
